<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Mini Payment Gateway{% endblock %}</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <style>
    *, *::before, *::after {
      border-radius: 0 !important;
    }

    body {
      background: #111;
      color: #eee;
    }

    /* Navbar */
    .top-navbar {
      background: #111;
      border-bottom: 1px solid #2a2a2a;
      padding: 0.6rem 1.5rem;
    }
    .top-navbar .brand {
      color: #eee;
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.03em;
    }
    .top-navbar .brand:hover {
      color: #fff;
    }

    /* Sidebar */
    .sidebar {
      background: #141414;
      border-right: 1px solid #222;
      min-height: 100vh;
      padding: 1.5rem 0;
    }
    .sidebar .nav-link {
      color: #aaa;
      padding: 0.45rem 1rem;
      font-size: 0.875rem;
      text-decoration: none;
      display: block;
      border-left: 2px solid transparent;
    }
    .sidebar .nav-link:hover {
      color: #eee;
      background: #1e1e1e;
    }
    .sidebar .nav-link.active {
      color: #eee;
      background: #1e1e1e;
      border-left: 2px solid #eee;
    }
    .sidebar .sub-link {
      padding-left: 1.5rem;
      font-size: 0.8rem;
    }
    .sidebar-section {
      color: #555;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.75rem 1rem 0.25rem;
    }

    /* Main content */
    .main-content {
      background: #111;
      padding: 2rem;
      min-height: calc(100vh - 48px);
    }

    /* Flat button */
    .btn-flat {
      background: #2a2a2a;
      color: #eee;
      border: 1px solid #444;
      padding: 0.25rem 0.65rem;
      font-size: 0.8rem;
      text-decoration: none;
      display: inline-block;
      cursor: pointer;
      line-height: 1.5;
    }
    .btn-flat:hover {
      background: #333;
      color: #eee;
    }
    .btn-flat:focus {
      outline: 1px solid #555;
      color: #eee;
    }

    /* Badges */
    .badge-ok {
      background: #1a3a1a;
      color: #6fcf6f;
      font-size: 0.75em;
      padding: 0.3em 0.55em;
    }
    .badge-fail {
      background: #1a1a1a;
      color: #cf6f6f;
      border: 1px solid #2a2a2a;
      font-size: 0.75em;
      padding: 0.3em 0.55em;
    }

    /* Flat panel / card */
    .flat-panel {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      padding: 1.25rem;
    }

    /* Section heading */
    .section-heading {
      border-bottom: 1px solid #333;
      padding-bottom: 4px;
      margin-bottom: 1rem;
      font-size: 1rem;
      font-weight: normal;
    }

    /* Section label (uppercase small) */
    .section-label {
      color: #777;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      margin-top: 1.25rem;
    }

    /* Dark table */
    .tbl {
      width: 100%;
      border-collapse: collapse;
      background: #1a1a1a;
    }
    .tbl th {
      background: #2a2a2a;
      color: #aaa;
      font-weight: normal;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      padding: 0.55rem 0.75rem;
      border-bottom: 1px solid #333;
      text-align: left;
    }
    .tbl td {
      color: #ccc;
      font-size: 0.85rem;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #222;
    }
    .tbl tbody tr:last-child td {
      border-bottom: none;
    }
    .tbl tbody tr:hover td {
      background: #1e1e1e;
    }

    /* Form inputs */
    .form-control,
    .form-select {
      background: #1a1a1a !important;
      color: #eee !important;
      border: 1px solid #444 !important;
      font-size: 0.875rem;
    }
    .form-control::placeholder {
      color: #555;
    }
    .form-control:focus,
    .form-select:focus {
      background: #1a1a1a !important;
      color: #eee !important;
      border-color: #666 !important;
      box-shadow: none !important;
    }
    .form-check-input {
      background-color: #2a2a2a !important;
      border-color: #555 !important;
    }
    .form-check-input:checked {
      background-color: #555 !important;
      border-color: #777 !important;
    }
    label.form-label {
      color: #bbb;
      font-size: 0.83rem;
      margin-bottom: 0.3rem;
    }
    .invalid-feedback {
      color: #cf6f6f;
      font-size: 0.78rem;
    }

    /* Alert messages */
    .msg-bar {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #ccc;
      padding: 0.6rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
    }
    .msg-bar.error { border-color: #5a2a2a; color: #cf6f6f; }
    .msg-bar.success { border-color: #1a3a1a; color: #6fcf6f; }
  </style>
</head>
<body>
  <!-- Top navbar -->
  <nav class="top-navbar d-flex align-items-center">
    <a href="/" class="brand">minigateway</a>
  </nav>

  <div class="container-fluid p-0">
    <div class="row g-0">
      <!-- Sidebar -->
      <nav class="col-md-2 sidebar d-none d-md-block">
        <ul class="nav flex-column">
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if '/payments/channels/' in request.path and 'new' not in request.path %}active{% endif %}" href="/payments/channels/">Payment Channels</a>
          </li>
          <li class="nav-item">
            <a class="nav-link sub-link {% if '/payments/channels/new/' in request.path %}active{% endif %}" href="/payments/channels/new/step1/">New Channel</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if '/parking/' in request.path %}active{% endif %}" href="/parking/pay/">Parking</a>
          </li>
          <li class="nav-item" style="margin-top: 0.5rem;">
            <a class="nav-link {% if '/admin/' in request.path %}active{% endif %}" href="/admin/">Admin</a>
          </li>
        </ul>
      </nav>

      <!-- Main content -->
      <main class="col-md-10 main-content">
        {% if messages %}
          {% for message in messages %}
            <div class="msg-bar {% if message.tags == 'error' %}error{% elif message.tags == 'success' %}success{% endif %}">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
      </main>
    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmCLFBumLiHkF+cVs5xfmFXm/gkP"
    crossorigin="anonymous"
  ></script>
</body>
</html>
